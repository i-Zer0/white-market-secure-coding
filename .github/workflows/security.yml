name: Build and security scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile
        run: python -m py_compile app.py tests/test_app.py
      - name: Unit and security regression tests
        env:
          WHITE_MARKET_ADMIN_PASSWORD: InitialAdmin!2468
          WHITE_MARKET_BACKUP_KEY: TestBackupKey!2468-secure
        run: python -m unittest discover -s tests -v
      - name: Install Bandit
        run: python -m pip install bandit
      - name: Security scan
        run: bandit -q -lll -r app.py

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
